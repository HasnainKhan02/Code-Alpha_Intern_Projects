<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks — To-Do List</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0d;
    --surface: #1a1916;
    --surface2: #222120;
    --border: rgba(255,255,255,.08);
    --border2: rgba(255,255,255,.14);
    --text: #f0ede8;
    --muted: #8a8680;
    --hint: #4a4845;
    --accent: #e8a030;
    --accent-dim: rgba(232,160,48,.12);
    --green: #5caa6f;
    --green-dim: rgba(92,170,111,.12);
    --red: #d95f4b;
    --red-dim: rgba(217,95,75,.1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 3rem 1rem 5rem;
  }

  /* ── Layout ── */
  .wrap { max-width: 680px; margin: 0 auto; }

  /* ── Header ── */
  .header { margin-bottom: 2.5rem; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: .4rem; }
  .app-title {
    font-family: 'Syne', sans-serif;
    font-size: 2.4rem; font-weight: 800; letter-spacing: -.03em;
    color: var(--text);
    line-height: 1;
  }
  .app-title span { color: var(--accent); }
  .date-badge {
    font-family: 'DM Mono', monospace;
    font-size: .72rem; letter-spacing: .08em; text-transform: uppercase;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: .4rem .8rem;
    border-radius: 6px;
    margin-top: .3rem;
  }
  .subtitle { font-size: .9rem; color: var(--muted); }

  /* ── Stats ── */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.2rem;
    transition: border-color .2s;
  }
  .stat-card:hover { border-color: var(--border2); }
  .stat-label { font-family: 'DM Mono', monospace; font-size: .65rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: .3rem; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: var(--text); }
  .stat-value.accent { color: var(--accent); }
  .stat-value.green { color: var(--green); }

  /* ── Progress ── */
  .progress-wrap { margin-bottom: 1.5rem; }
  .progress-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: .5rem; }
  .progress-label { font-family: 'DM Mono', monospace; font-size: .68rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
  .progress-pct { font-family: 'Syne', sans-serif; font-size: .9rem; font-weight: 700; color: var(--accent); }
  .progress-bg { background: var(--surface2); border-radius: 4px; height: 5px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .5s cubic-bezier(.16,1,.3,1); width: 0%; }

  /* ── Add row ── */
  .add-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1rem 1.2rem;
    margin-bottom: 1.2rem;
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }
  .add-wrap input[type="text"] {
    flex: 1; min-width: 180px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: .95rem;
    padding: .65rem 1rem;
    outline: none;
    transition: border-color .2s;
  }
  .add-wrap input[type="text"]:focus { border-color: var(--accent); }
  .add-wrap input[type="text"]::placeholder { color: var(--hint); }
  .priority-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: .72rem; letter-spacing: .06em; text-transform: uppercase;
    padding: .65rem .9rem;
    outline: none; cursor: pointer;
    transition: border-color .2s;
  }
  .priority-select:focus { border-color: var(--accent); }
  .priority-select option { background: var(--surface2); text-transform: none; font-size: .85rem; letter-spacing: 0; }
  .btn-add {
    background: var(--accent);
    color: #0f0e0d;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: .85rem; font-weight: 700; letter-spacing: .03em;
    padding: .65rem 1.4rem;
    cursor: pointer;
    transition: opacity .2s, transform .15s;
    white-space: nowrap;
  }
  .btn-add:hover { opacity: .88; transform: translateY(-1px); }
  .btn-add:active { transform: scale(.97); }

  /* ── Filters ── */
  .filters-wrap { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 1.2rem; }
  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: .65rem; letter-spacing: .1em; text-transform: uppercase;
    padding: .35rem .9rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 20px; cursor: pointer;
    transition: background .15s, color .15s, border-color .15s;
  }
  .filter-btn:hover { color: var(--text); border-color: var(--border2); }
  .filter-btn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
  .filter-sep { flex: 1; }
  .clear-btn {
    font-family: 'DM Mono', monospace;
    font-size: .62rem; letter-spacing: .08em; text-transform: uppercase;
    color: var(--hint); background: transparent; border: none; cursor: pointer;
    padding: .35rem .5rem;
    transition: color .2s;
  }
  .clear-btn:hover { color: var(--red); }

  /* ── Task List ── */
  .list { display: flex; flex-direction: column; gap: 6px; }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: .62rem; letter-spacing: .12em; text-transform: uppercase;
    color: var(--hint); margin: 10px 0 4px; padding-left: 4px;
  }

  .task-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    transition: border-color .2s, opacity .25s, transform .2s;
    animation: slideIn .25s ease forwards;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .task-item:hover { border-color: var(--border2); }
  .task-item.done { opacity: .45; }

  .task-check {
    width: 20px; height: 20px; flex-shrink: 0;
    border: 1.5px solid var(--border2);
    border-radius: 6px;
    background: transparent;
    cursor: pointer;
    appearance: none; -webkit-appearance: none;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, border-color .2s;
    position: relative;
  }
  .task-check:checked {
    background: var(--green);
    border-color: var(--green);
  }
  .task-check:checked::after {
    content: '';
    width: 5px; height: 9px;
    border: 2px solid #0f0e0d;
    border-top: none; border-left: none;
    transform: rotate(45deg) translate(-1px, -1px);
    display: block;
  }

  .task-body { flex: 1; min-width: 0; }
  .task-text {
    font-size: .95rem; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: color .2s;
  }
  .task-item.done .task-text { text-decoration: line-through; color: var(--hint); }

  .task-meta { display: flex; gap: 6px; align-items: center; margin-top: 3px; }

  .badge {
    font-family: 'DM Mono', monospace;
    font-size: .62rem; letter-spacing: .06em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 20px; font-weight: 500;
  }
  .badge-high   { background: rgba(217,95,75,.18); color: #e8806e; border: 1px solid rgba(217,95,75,.25); }
  .badge-medium { background: rgba(232,160,48,.14); color: #e8a030; border: 1px solid rgba(232,160,48,.2); }
  .badge-low    { background: rgba(92,170,111,.14); color: #5caa6f; border: 1px solid rgba(92,170,111,.2); }

  .task-date { font-family: 'DM Mono', monospace; font-size: .62rem; color: var(--hint); letter-spacing: .04em; }

  .task-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .action-btn {
    background: transparent; border: none; cursor: pointer;
    color: var(--hint); padding: 5px;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; line-height: 1;
    transition: background .15s, color .15s;
  }
  .action-btn:hover { background: var(--surface2); color: var(--text); }
  .action-btn.del:hover { color: var(--red); background: var(--red-dim); }

  .edit-input {
    font-family: 'DM Sans', sans-serif;
    font-size: .95rem; color: var(--text);
    background: transparent; border: none;
    border-bottom: 1.5px solid var(--accent);
    outline: none; width: 100%; padding: 0 0 2px;
  }

  /* ── Empty ── */
  .empty-state {
    text-align: center; padding: 3rem 1rem;
    color: var(--hint); font-size: .9rem;
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: .8rem; opacity: .35; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .app-title { font-size: 1.8rem; }
    .stats-row { grid-template-columns: repeat(3,1fr); gap: 6px; }
    .stat-value { font-size: 1.5rem; }
    .add-wrap { flex-direction: column; }
    .add-wrap input[type="text"], .priority-select, .btn-add { width: 100%; }
  }
</style>
</head>
<body>

<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <h1 class="app-title">My <span>Tasks</span></h1>
      <div class="date-badge" id="date-badge"></div>
    </div>
    <p class="subtitle">Stay on top of what matters — tasks auto-save in your browser.</p>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total</div>
      <div class="stat-value" id="s-total">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Done</div>
      <div class="stat-value green" id="s-done">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Remaining</div>
      <div class="stat-value accent" id="s-rem">0</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-meta">
      <span class="progress-label">Progress</span>
      <span class="progress-pct" id="prog-pct">0%</span>
    </div>
    <div class="progress-bg">
      <div class="progress-fill" id="prog-fill"></div>
    </div>
  </div>

  <!-- Add Task -->
  <div class="add-wrap">
    <input type="text" id="task-input" placeholder="What needs to be done?" maxlength="120" />
    <select class="priority-select" id="prio-select">
      <option value="medium">Medium</option>
      <option value="high">High</option>
      <option value="low">Low</option>
    </select>
    <button class="btn-add" id="add-btn">+ Add Task</button>
  </div>

  <!-- Filters -->
  <div class="filters-wrap" id="filters-wrap">
    <button class="filter-btn active" data-f="all">All</button>
    <button class="filter-btn" data-f="active">Active</button>
    <button class="filter-btn" data-f="done">Done</button>
    <button class="filter-btn" data-f="high">High</button>
    <button class="filter-btn" data-f="medium">Medium</button>
    <button class="filter-btn" data-f="low">Low</button>
    <span class="filter-sep"></span>
    <button class="clear-btn" id="clear-btn">Clear done</button>
  </div>

  <!-- Task List -->
  <div class="list" id="task-list"></div>

</div>

<script>
  const STORAGE_KEY = 'mytasks_v2';
  let tasks = [], activeFilter = 'all', editingId = null;

  // Date badge
  document.getElementById('date-badge').textContent =
    new Date().toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'long', year:'numeric' });

  // Load / seed
  function loadTasks() {
    try { tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { tasks = []; }
    if (!tasks.length) {
      tasks = [
        { id: 1, text: 'Review project proposal', priority: 'high',   done: false, created: fmt(new Date()) },
        { id: 2, text: 'Set up development environment', priority: 'medium', done: true, created: fmt(new Date(Date.now()-86400000)) },
        { id: 3, text: 'Write unit tests for the API', priority: 'low',   done: false, created: fmt(new Date()) },
        { id: 4, text: 'Update the README documentation', priority: 'medium', done: false, created: fmt(new Date()) },
      ];
      saveTasks();
    }
  }

  function saveTasks() { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }

  function fmt(d) { return d.toLocaleDateString('en-GB', { day:'numeric', month:'short' }); }

  // Add
  function addTask() {
    const inp = document.getElementById('task-input');
    const prio = document.getElementById('prio-select').value;
    const text = inp.value.trim();
    if (!text) { inp.focus(); return; }
    tasks.unshift({ id: Date.now() + Math.random(), text, priority: prio, done: false, created: fmt(new Date()) });
    inp.value = '';
    saveTasks(); render();
  }

  // Toggle
  function toggleTask(id) {
    const t = tasks.find(x => x.id === id);
    if (t) { t.done = !t.done; saveTasks(); render(); }
  }

  // Delete
  function deleteTask(id) {
    tasks = tasks.filter(x => x.id !== id);
    saveTasks(); render();
  }

  // Edit
  function startEdit(id) {
    editingId = id; render();
    setTimeout(() => {
      const el = document.getElementById('edit-' + id);
      if (el) { el.focus(); el.select(); }
    }, 0);
  }

  function commitEdit(id) {
    const el = document.getElementById('edit-' + id);
    if (!el) return;
    const v = el.value.trim();
    const t = tasks.find(x => x.id === id);
    if (t && v) t.text = v;
    editingId = null; saveTasks(); render();
  }

  function cancelEdit() { editingId = null; render(); }

  // Clear done
  function clearDone() { tasks = tasks.filter(x => !x.done); saveTasks(); render(); }

  // Filter
  function setFilter(f) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.f === f)
    );
    render();
  }

  function getFiltered() {
    if (activeFilter === 'active') return tasks.filter(x => !x.done);
    if (activeFilter === 'done')   return tasks.filter(x => x.done);
    if (['high','medium','low'].includes(activeFilter)) return tasks.filter(x => x.priority === activeFilter);
    return tasks;
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Render a single task row
  function taskRow(t) {
    const prioLabel = t.priority.charAt(0).toUpperCase() + t.priority.slice(1);
    const body = editingId === t.id
      ? `<input class="edit-input" id="edit-${t.id}" value="${esc(t.text)}"
           onblur="commitEdit(${t.id})"
           onkeydown="if(event.key==='Enter')commitEdit(${t.id});if(event.key==='Escape')cancelEdit()" />`
      : `<div class="task-text">${esc(t.text)}</div>
         <div class="task-meta">
           <span class="badge badge-${t.priority}">${prioLabel}</span>
           <span class="task-date">${t.created}</span>
         </div>`;

    const editBtn = editingId !== t.id
      ? `<button class="action-btn" onclick="startEdit(${t.id})" title="Edit" aria-label="Edit task">
           <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
             <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
             <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
           </svg>
         </button>` : '';

    return `<div class="task-item${t.done ? ' done' : ''}">
      <input type="checkbox" class="task-check" ${t.done ? 'checked' : ''}
        onchange="toggleTask(${t.id})" aria-label="Mark done" />
      <div class="task-body">${body}</div>
      <div class="task-actions">
        ${editBtn}
        <button class="action-btn del" onclick="deleteTask(${t.id})" title="Delete" aria-label="Delete task">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </div>
    </div>`;
  }

  // Main render
  function render() {
    const total     = tasks.length;
    const doneCount = tasks.filter(x => x.done).length;
    const rem       = total - doneCount;
    const pct       = total ? Math.round(doneCount / total * 100) : 0;

    document.getElementById('s-total').textContent = total;
    document.getElementById('s-done').textContent  = doneCount;
    document.getElementById('s-rem').textContent   = rem;
    document.getElementById('prog-pct').textContent = pct + '%';
    document.getElementById('prog-fill').style.width = pct + '%';

    const filtered = getFiltered();
    const active   = filtered.filter(x => !x.done);
    const done     = filtered.filter(x => x.done);
    const list     = document.getElementById('task-list');

    if (!filtered.length) {
      list.innerHTML = `<div class="empty-state">
        <div class="empty-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12l2 2 4-4"/>
          </svg>
        </div>
        ${tasks.length ? 'No tasks match this filter.' : 'All clear — add a task above!'}
      </div>`;
      return;
    }

    let html = active.map(taskRow).join('');
    if (done.length) {
      if (active.length) html += `<div class="section-label">Completed</div>`;
      html += done.map(taskRow).join('');
    }
    list.innerHTML = html;
  }

  // Event listeners
  document.getElementById('add-btn').addEventListener('click', addTask);
  document.getElementById('task-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
  document.getElementById('clear-btn').addEventListener('click', clearDone);
  document.querySelectorAll('.filter-btn').forEach(btn =>
    btn.addEventListener('click', () => setFilter(btn.dataset.f))
  );

  // Boot
  loadTasks();
  render();
</script>
</body>
</html>
